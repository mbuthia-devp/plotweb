<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Plot Weaver</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cormorant Garamond', serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: auto;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(184, 134, 11, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(218, 165, 32, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .box {
            background: linear-gradient(145deg, #111111 0%, #1a1a1a 50%, #0f0f0f 100%);
            border: 1px solid rgba(184, 134, 11, 0.3);
            border-radius: 4px;
            box-shadow: 0 0 60px rgba(184, 134, 11, 0.1), inset 0 1px 0 rgba(255, 215, 0, 0.1);
            padding: 50px 45px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
            animation: reveal 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .box::before, .box::after {
            content: '◆';
            position: absolute;
            color: rgba(184, 134, 11, 0.4);
            font-size: 12px;
        }
        .box::before { top: 20px; left: 20px; }
        .box::after { bottom: 20px; right: 20px; }
        @keyframes reveal {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        form h1 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 35px;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }
        .ornament-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(184, 134, 11, 0.6), transparent);
            margin: 20px 0;
            position: relative;
        }
        .ornament-line::before {
            content: '✦';
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            color: rgba(184, 134, 11, 0.6);
            background: #111;
            padding: 0 15px;
            font-size: 10px;
        }
        label {
            display: block;
            color: rgba(184, 134, 11, 0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            margin-top: 18px;
        }
        input[type="text"], input[type="tel"], input[type="email"], input[type="password"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(184, 134, 11, 0.3);
            color: #e8e0cc;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            padding: 14px 18px;
            outline: none;
            letter-spacing: 0.5px;
            transition: all 0.4s ease;
        }
        input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.2);
            background: rgba(184, 134, 11, 0.05);
        }
        input::placeholder {
            color: rgba(184, 134, 11, 0.3);
            font-style: italic;
        }
        button[type="submit"] {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(184, 134, 11, 0.4);
            background: rgba(184, 134, 11, 0.1);
            color: #d4af37;
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            margin-top: 30px;
        }
        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: rgba(184, 134, 11, 0.15);
            transition: left 0.4s ease;
        }
        button[type="submit"]:hover::before { left: 0; }
        button[type="submit"]:hover {
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.2);
            color: #f0d878;
        }
        .login-link {
            text-align: center;
            margin-top: 25px;
        }
        .login-link a {
            color: rgba(184, 134, 11, 0.5);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        .login-link a:hover { color: #d4af37; }
        .admin-link {
            text-align: center;
            margin-top: 15px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s ease;
        }
        .admin-link.visible {
            opacity: 1;
            max-height: 60px;
        }
        .admin-link a {
            display: inline-block;
            padding: 10px 25px;
            border: 1px solid rgba(180, 50, 50, 0.5);
            color: #c95555;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }
        .admin-link a:hover {
            background: rgba(180, 50, 50, 0.15);
            border-color: #c95555;
            box-shadow: 0 0 15px rgba(180, 50, 50, 0.2);
        }
        .admin-icon { margin-right: 8px; }
        .hint-text {
            text-align: center;
            color: rgba(184, 134, 11, 0.2);
            font-size: 11px;
            margin-top: 20px;
            letter-spacing: 1px;
        }
        .error-msg {
            color: #c44;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
            letter-spacing: 1px;
        }
        .success-msg {
            color: #4a4;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="box">
        <form id="signupForm" method="post" action="{% url 'signup' %}">
            {% csrf_token %}

            <h1>Sign Up</h1>
            <div class="ornament-line"></div>

            <div class="error-msg" id="errorMsg">
                {% if errors %}
                    {{ errors.0 }}
                {% endif %}
            </div>
            <div class="success-msg" id="successMsg">Account created! Redirecting...</div>

            <label for="firstName">First Name</label>
            <input type="text" name="firstName" id="firstName" placeholder="Enter first name" required>

            <label for="secondName">Second Name</label>
            <input type="text" name="secondName" id="secondName" placeholder="Enter second name" required>

            <label for="contact">Contact</label>
            <input type="tel" name="contact" id="contact" placeholder="+254 110673887" required>

            <label for="profile_image">Profile Image (optional)</label>
            <input type="file" name="profile_image" id="profile_image" accept="image/*">

            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="your@email.com" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Create password" required>

            <button type="submit">Sign Up</button>
        </form>

        <div class="admin-link" id="adminLink">
            <a href="{% url 'admin_dashboard' %}">
                <span class="admin-icon">⚜</span>Admin Dashboard
            </a>
        </div>

        <div class="login-link">
            <a href="{% url 'login' %}">Already have an account? Log In →</a>
        </div>

        <div class="hint-text" id="hintText"></div>
    </div>

    <script>
        // Admin credentials check
        const ADMIN_CREDENTIALS = {
            firstName: 'Ishmael',
            secondName: 'Prince',
            contact: '+254 110673887',
            email: 'ogutuishmael25@gmail.com',
            password: 'ishma254'
        };

        const inputs = ['firstName', 'secondName', 'contact', 'email', 'password'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', checkAdminCredentials);
        });

        function checkAdminCredentials() {
            const firstName = document.getElementById('firstName').value.trim();
            const secondName = document.getElementById('secondName').value.trim();
            const contact = document.getElementById('contact').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const isAdmin = (
                firstName === ADMIN_CREDENTIALS.firstName &&
                secondName === ADMIN_CREDENTIALS.secondName &&
                contact === ADMIN_CREDENTIALS.contact &&
                email === ADMIN_CREDENTIALS.email &&
                password === ADMIN_CREDENTIALS.password
            );

            const adminLink = document.getElementById('adminLink');
            if (isAdmin) adminLink.classList.add('visible');
            else adminLink.classList.remove('visible');
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            const formData = new FormData(this);
            
            fetch('{% url "signup" %}', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/profile/';
                    }, 1500);
                } else {
                    errorMsg.textContent = data.error || 'Signup failed. Please try again.';
                    errorMsg.style.display = 'block';
                }
            })
            .catch(error => {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
